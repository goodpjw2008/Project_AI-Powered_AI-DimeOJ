{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>내 정보 수정</h2>
    <form method="post" action="{{ url_for('edit_profile', nickname=user.get_username() or '') }}">
      <label for="current_password">현재 비밀번호</label>
      <input type="password" id="current_password" name="current_password" required>
      
      <label for="new_password">새 비밀번호 (변경 원할 때만 입력)</label>
      <input type="password" id="new_password" name="new_password">
      
      <label for="codeforces_handle">Codeforces 핸들</label>
      <input type="text" id="codeforces_handle" name="codeforces_handle" value="{{ user.codeforces_handle or '' }}">
      
      <label for="atcoder_handle">AtCoder 핸들</label>
      <input type="text" id="atcoder_handle" name="atcoder_handle" value="{{ user.atcoder_handle or '' }}">
      
      <label for="preferred_site">표시색 사이트 선택</label>
      <select id="preferred_site" name="preferred_site" style="width: 100%; padding: 0.7rem 0.9rem; margin-bottom: 0.5rem; border: 1px solid #d0d7de; border-radius: 6px; font-size: 1rem; background: #f8fafc;">
        <option value="none" {% if user.preferred_site=='none' %}selected{% endif %}>미선택</option>
        <option value="cf" {% if user.preferred_site=='cf' %}selected{% endif %}>Codeforces 티어 색</option>
        <option value="ac" {% if user.preferred_site=='ac' %}selected{% endif %}>AtCoder 티어 색</option>
      </select>
      
      <button type="submit">저장</button>
    </form>
    
    <!-- 보안 안내사항 -->
    <div class="security-info" style="background-color: #f8f9fa; padding: 10px; margin-top: 15px; border-radius: 4px; border-left: 4px solid #28a745;">
      <h4 style="margin-top: 0;">보안 강화</h4>
      <ul style="padding-left: 20px; margin-bottom: 0;">
        <li>아이디와 비밀번호는 암호화 됩니다.</li>
        <li>비밀번호는 8자리 이상이어야 하고 영문, 숫자, 특수문자가 포함되어야 합니다.</li>
      </ul>
    </div>
  </div>
</div>
{% endblock %}

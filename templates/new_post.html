{% extends 'base.html' %}
{% block content %}
<div class="board-write-container">
  <h2 class="board-title">글쓰기</h2>
  <form method="post" class="board-write-form">
    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" id="title" name="title" required>
    </div>
    <div class="form-group">
      <label for="content">내용</label>
      <textarea id="content" name="content" rows="12" required></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="board-btn">등록</button>
      <a href="{{ url_for('forum') }}" class="board-btn board-btn-cancel">취소</a>
    </div>
  </form>
</div>
{% endblock %}
